<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная страница со звуком</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
        }

        .hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 25px;
            animation: pulse 2s infinite;
            z-index: 1;
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="hint">👆 Нажми в любом месте!</div>

    <script>
        const body = document.body;
        const hint = document.querySelector('.hint');
        
        // Создаем аудио контекст
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let audioBuffer = null;
        let isSoundLoaded = false;

        // Загружаем звук
        async function loadSound() {
            try {
                const response = await fetch('click-sound.mp3');
                const arrayBuffer = await response.arrayBuffer();
                audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                isSoundLoaded = true;
                console.log('✅ Звук загружен и готов к воспроизведению');
            } catch (error) {
                console.error('❌ Ошибка загрузки звука:', error);
                // Пробуем альтернативный способ
                tryAlternativeLoad();
            }
        }

        function tryAlternativeLoad() {
            const audio = new Audio();
            audio.src = 'click-sound.mp3';
            
            audio.addEventListener('loadeddata', async () => {
                try {
                    const response = await fetch('click-sound.mp3');
                    const arrayBuffer = await response.arrayBuffer();
                    audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    isSoundLoaded = true;
                    console.log('✅ Звук загружен альтернативным способом');
                } catch (e) {
                    console.error('Не удалось загрузить звук');
                }
            });
            
            audio.load();
        }

        // Воспроизведение звука на 100% громкости
        function playSound(x, y) {
            // Активируем аудио контекст если нужно
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            if (!audioBuffer) {
                console.log('Звук еще загружается...');
                return;
            }

            try {
                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                
                // Громкость на 100% (1.0 = максимум)
                const gainNode = audioContext.createGain();
                gainNode.gain.setValueAtTime(1.0, audioContext.currentTime); // 100% громкость
                
                source.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                source.start(0);
                
                // Скрываем подсказку
                if (hint) {
                    hint.style.opacity = '0';
                    hint.style.transition = 'opacity 0.5s ease';
                    setTimeout(() => {
                        if (hint) hint.remove();
                    }, 500);
                }
                
                // Визуальный эффект
                createClickEffect(x, y);
                
            } catch (error) {
                console.error('Ошибка воспроизведения:', error);
            }
        }

        function createClickEffect(x, y) {
            const effect = document.createElement('div');
            effect.style.cssText = `
                position: fixed;
                left: ${x - 25}px;
                top: ${y - 25}px;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(255,255,255,0.8), rgba(255,255,255,0) 70%);
                pointer-events: none;
                z-index: 1000;
                animation: clickRipple 0.6s ease-out;
            `;

            document.body.appendChild(effect);
            effect.addEventListener('animationend', () => {
                effect.remove();
            });
        }

        // Добавляем стили для анимации
        const style = document.createElement('style');
        style.textContent = `
            @keyframes clickRipple {
                0% { transform: scale(0.5); opacity: 1; }
                100% { transform: scale(2); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Основной обработчик - работает сразу с любого места
        body.addEventListener('click', (e) => {
            // Активируем аудио контекст при первом клике
            if (audioContext.state === 'suspended') {
                audioContext.resume().then(() => {
                    console.log('Аудио контекст активирован');
                });
            }
            
            playSound(e.clientX, e.clientY);
        });

        // Предотвращаем выделение текста
        body.addEventListener('mousedown', (e) => {
            e.preventDefault();
        });

        // Загружаем звук при старте
        loadSound();
        console.log('Сайт готов! Кликайте в любом месте для воспроизведения звука на 100% громкости');
    </script>
</body>
</html>
