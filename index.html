<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная страница со звуком</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <script>
        const body = document.body;
        
        // Создаем аудио контекст
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let audioBuffer = null;
        let isPlaying = false;
        let currentSource = null;
        let currentGainNode = null;

        // Загружаем звук
        async function loadSound() {
            try {
                const response = await fetch('click-sound.mp3');
                const arrayBuffer = await response.arrayBuffer();
                audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                console.log('✅ Звук загружен и готов');
            } catch (error) {
                console.error('❌ Ошибка загрузки звука:', error);
                tryAlternativeLoad();
            }
        }

        function tryAlternativeLoad() {
            const audio = new Audio();
            audio.src = 'click-sound.mp3';
            
            audio.addEventListener('loadeddata', async () => {
                try {
                    const response = await fetch('click-sound.mp3');
                    const arrayBuffer = await response.arrayBuffer();
                    audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    console.log('✅ Звук загружен альтернативным способом');
                } catch (e) {
                    console.error('Не удалось загрузить звук');
                }
            });
            
            audio.load();
        }

        // Запуск бесконечного звука (нельзя остановить)
        function startInfiniteSound(x, y) {
            // Активируем аудио контекст если нужно
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            if (!audioBuffer) {
                console.log('Звук еще загружается...');
                return;
            }

            // Если звук уже играет - просто создаем визуальный эффект
            if (isPlaying) {
                createClickEffect(x, y);
                console.log('🔊 Звук продолжает играть');
                return;
            }

            try {
                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.loop = true; // Бесконечное зацикливание
                
                // Громкость на 100%
                const gainNode = audioContext.createGain();
                gainNode.gain.setValueAtTime(1.0, audioContext.currentTime);
                
                source.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                source.start(0);
                currentSource = source;
                currentGainNode = gainNode;
                isPlaying = true;
                
                console.log('🔊 Бесконечный звук запущен (остановить нельзя)');
                
                // Визуальный эффект
                createClickEffect(x, y);
                
                // Защита от случайной остановки
                source.onended = (event) => {
                    // Если звук закончился не по нашей воле - перезапускаем
                    if (isPlaying && event.target === currentSource) {
                        console.log('⚠️ Звук прерван, перезапускаю...');
                        setTimeout(() => {
                            if (isPlaying) {
                                startInfiniteSound(window.innerWidth/2, window.innerHeight/2);
                            }
                        }, 100);
                    }
                };
                
                // Блокируем все способы остановки
                window.addEventListener('beforeunload', () => {
                    // Даже при уходе со страницы звук будет играть пока страница открыта
                });
                
                // Перехватываем попытки остановить аудио
                const originalStop = source.stop;
                source.stop = function() {
                    console.log('🛑 Попытка остановки заблокирована');
                    return; // Ничего не делаем
                };
                
            } catch (error) {
                console.error('Ошибка:', error);
                // Пробуем перезапустить через секунду
                setTimeout(() => {
                    if (!isPlaying) {
                        startInfiniteSound(window.innerWidth/2, window.innerHeight/2);
                    }
                }, 1000);
            }
        }

        function createClickEffect(x, y) {
            const effect = document.createElement('div');
            effect.style.cssText = `
                position: fixed;
                left: ${x - 25}px;
                top: ${y - 25}px;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0) 70%);
                pointer-events: none;
                z-index: 1000;
                animation: clickRipple 0.6s ease-out;
            `;

            document.body.appendChild(effect);
            effect.addEventListener('animationend', () => {
                effect.remove();
            });
        }

        // Добавляем стили для анимации
        const style = document.createElement('style');
        style.textContent = `
            @keyframes clickRipple {
                0% { transform: scale(0.5); opacity: 1; }
                100% { transform: scale(2); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Основной обработчик - только запускает звук
        body.addEventListener('click', (e) => {
            // Активируем аудио контекст при первом клике
            if (audioContext.state === 'suspended') {
                audioContext.resume().then(() => {
                    console.log('Аудио контекст активирован');
                });
            }
            
            startInfiniteSound(e.clientX, e.clientY);
        });

        // Предотвращаем выделение текста
        body.addEventListener('mousedown', (e) => {
            e.preventDefault();
        });

        // Блокируем клавиши, которые могут остановить звук
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' || e.key === 'Space' || e.key === 'MediaPlayPause') {
                e.preventDefault();
                console.log('🛑 Клавиша остановки заблокирована');
            }
        });

        // Автозапуск при загрузке
        window.addEventListener('load', () => {
            setTimeout(() => {
                startInfiniteSound(window.innerWidth/2, window.innerHeight/2);
            }, 500);
        });

        // Перезапуск если контекст был приостановлен
        audioContext.addEventListener('statechange', () => {
            if (audioContext.state === 'suspended' && isPlaying) {
                console.log('⚠️ Аудио контекст приостановлен, возобновляю...');
                audioContext.resume();
            }
        });

        // Загружаем звук при старте
        loadSound();
        console.log('🔊 Сайт готов! Бесконечный звук запустится автоматически');
    </script>
</body>
</html>
